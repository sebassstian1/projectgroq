<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%236366f1'/><stop offset='100%' stop-color='%2310b981'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><text y='.9em' font-size='65' x='18' font-family='system-ui' font-weight='700' fill='white'>PG</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProjectGroq</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #030308;
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem; overflow-x: hidden;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    .bg-glow1 {
      position: fixed; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
      top: -200px; right: -100px; pointer-events: none;
    }
    .bg-glow2 {
      position: fixed; width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(16,185,129,0.06) 0%, transparent 70%);
      bottom: -100px; left: -100px; pointer-events: none;
    }
    .app { width: 100%; max-width: 600px; position: relative; z-index: 1; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #10b981);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: #fff;
    }
    .logo-text { font-size: 18px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
    .logo-text span { color: rgba(255,255,255,0.35); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .status-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 20px;
      background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2);
      font-size: 11px; color: #6ee7b7; font-weight: 500; letter-spacing: 0.05em;
    }
    .logout-btn {
      padding: 5px 12px; border-radius: 20px;
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5; font-size: 11px; font-weight: 500;
      text-decoration: none; letter-spacing: 0.05em; transition: opacity 0.2s;
    }
    .logout-btn:hover { opacity: 0.75; }
    .pulse {
      width: 6px; height: 6px; border-radius: 50%; background: #10b981;
      box-shadow: 0 0 0 0 rgba(16,185,129,0.5); animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(16,185,129,0.5); }
      70%  { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
      100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
    }
    .section-label {
      font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.2);
      letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px;
    }
    .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .mode-btn {
      padding: 14px 16px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.35); cursor: pointer;
      transition: all 0.2s; text-align: left; position: relative; overflow: hidden;
    }
    .mode-btn::before { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.2s; }
    .mode-btn.fast::before { background: linear-gradient(135deg, rgba(99,102,241,0.1), transparent); }
    .mode-btn.pro::before  { background: linear-gradient(135deg, rgba(16,185,129,0.1), transparent); }
    .mode-btn:hover { border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.6); }
    .mode-btn.active.fast { border-color: rgba(99,102,241,0.5); background: rgba(99,102,241,0.08); color: #fff; }
    .mode-btn.active.pro  { border-color: rgba(16,185,129,0.5); background: rgba(16,185,129,0.08); color: #fff; }
    .mode-btn.active::before { opacity: 1; }
    .mode-tag {
      display: inline-block; font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; padding: 2px 7px; border-radius: 4px; margin-bottom: 6px;
    }
    .fast .mode-tag { background: rgba(99,102,241,0.2); color: #a5b4fc; }
    .pro  .mode-tag { background: rgba(16,185,129,0.2); color: #6ee7b7; }
    .mode-title { font-size: 14px; font-weight: 600; display: block; margin-bottom: 2px; }
    .mode-desc  { font-size: 11px; color: rgba(255,255,255,0.3); }
    .mode-btn.active .mode-desc { color: rgba(255,255,255,0.45); }
    .notif {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 10px;
      font-size: 12px; font-weight: 500; margin-bottom: 10px; transition: all 0.25s;
    }
    .notif.ok   { background: rgba(16,185,129,0.07); border: 1px solid rgba(16,185,129,0.18); color: #6ee7b7; }
    .notif.warn { background: rgba(245,158,11,0.07); border: 1px solid rgba(245,158,11,0.18); color: #fcd34d; }
    .notif.err  { background: rgba(239,68,68,0.07);  border: 1px solid rgba(239,68,68,0.18);  color: #fca5a5; }
    .notif-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .ok   .notif-dot { background: #10b981; }
    .warn .notif-dot { background: #f59e0b; }
    .err  .notif-dot { background: #ef4444; }
    .style-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .style-btn {
      padding: 5px 14px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.35); font-size: 11px;
      cursor: pointer; font-family: inherit; transition: all 0.18s;
    }
    .style-btn.active {
      background: rgba(99,102,241,0.15);
      border-color: rgba(99,102,241,0.4);
      color: #a5b4fc; font-weight: 600;
    }
    .input-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(110,100,220,0.35);
      border-radius: 16px; padding: 16px 18px; margin-bottom: 10px;
      transition: border-color 0.3s, box-shadow 0.3s;
      box-shadow: 0 0 18px rgba(99,90,220,0.08), inset 0 0 20px rgba(80,70,200,0.04);
    }
    .input-card:focus-within {
      border-color: rgba(130,110,255,0.65);
      box-shadow: 0 0 28px rgba(110,90,255,0.18), inset 0 0 20px rgba(100,80,220,0.07);
    }
    textarea {
      width: 100%; background: transparent; border: none; outline: none;
      color: rgba(255,255,255,0.8); font-size: 14px; line-height: 1.75;
      resize: none; font-family: inherit;
    }
    textarea::placeholder { color: rgba(255,255,255,0.15); }
    .input-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 12px; margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.05);
    }
    .chars { font-size: 11px; color: rgba(255,255,255,0.18); font-weight: 500; }
    .chars.warn { color: #f59e0b; }
    .run-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 22px; border-radius: 10px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer; color: #fff;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      letter-spacing: 0.02em; transition: all 0.2s; font-family: inherit;
    }
    .run-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .run-btn:active { transform: translateY(0); }
    .run-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }
    .run-btn svg { width: 14px; height: 14px; }
    .actions-row { display: flex; gap: 8px; align-items: center; }
    .tr-btn {
      padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
      font-size: 12px; font-weight: 600; cursor: pointer; color: #fff;
      background: rgba(255,255,255,0.04); letter-spacing: 0.02em;
      transition: all 0.2s; font-family: inherit;
    }
    .tr-btn:hover { background: rgba(255,255,255,0.08); transform: translateY(-1px); }
    .tr-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }
    .result-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(90,110,220,0.3);
      border-radius: 16px; padding: 16px 18px;
      box-shadow: 0 0 18px rgba(80,90,200,0.07), inset 0 0 20px rgba(70,80,180,0.03);
    }
    .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .result-label {
      font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.2);
      letter-spacing: 0.12em; text-transform: uppercase;
    }
    .result-actions { display: flex; align-items: center; gap: 8px; }
    .model-chip {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.06);
      padding: 3px 10px; border-radius: 20px; font-weight: 500;
    }
    .copy-btn {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(99,102,241,0.2);
      font-size: 11px; font-weight: 500; cursor: pointer;
      background: rgba(99,102,241,0.1); color: #a5b4fc;
      font-family: inherit; transition: all 0.2s;
    }
    .copy-btn:hover { background: rgba(99,102,241,0.2); }
    .chip-dot { width: 5px; height: 5px; border-radius: 50%; background: #6366f1; }
    .result-text { font-size: 14px; color: rgba(255,255,255,0.72); line-height: 1.8; min-height: 56px; }
    .result-text strong { color: #fff; font-weight: 600; }
    .stats-row { display: flex; gap: 8px; margin-top: 10px; }
    .stat {
      flex: 1; padding: 10px 12px; border-radius: 10px;
      background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); text-align: center;
    }
    .stat-val {
      font-size: 16px; font-weight: 700; color: #fff;
      background: linear-gradient(90deg, #a5b4fc, #6ee7b7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .stat-lbl { font-size: 10px; color: rgba(255,255,255,0.22); margin-top: 2px; font-weight: 500; letter-spacing: 0.05em; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor {
      display: inline-block; width: 2px; height: 14px; background: #6366f1;
      border-radius: 1px; animation: blink 0.7s infinite; vertical-align: middle; margin-left: 1px;
    }
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow1"></div>
<div class="bg-glow2"></div>
<canvas id="particles" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>

<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">PG</div>
      <div class="logo-text">Project<span>Groq</span></div>
    </div>
    <div class="header-right">
      <div class="status-badge"><div class="pulse"></div>ONLINE</div>
      <a href="/logout" class="logout-btn">ВЫЙТИ</a>
    </div>
  </div>

  <div class="section-label">Режим обработки</div>
  <div class="mode-grid">
    <button class="mode-btn fast active" onclick="pick(this,'fast','llama-3.1-8b-instant')">
      <span class="mode-tag">FAST</span>
      <span class="mode-title">Quick Scan</span>
      <span class="mode-desc">Llama 3.1 8B · быстро</span>
    </button>
    <button class="mode-btn pro" onclick="pick(this,'pro','llama-3.3-70b-versatile')">
      <span class="mode-tag">PRO</span>
      <span class="mode-title">Deep Analysis</span>
      <span class="mode-desc">Llama 3.3 70B · точно</span>
    </button>
  </div>

  <div class="notif ok" id="notif">
    <div class="notif-dot"></div>
    <span id="ntxt">Quick Scan — готов к работе</span>
  </div>

  <div class="section-label">Стиль суммаризации</div>
  <div class="style-row">
    <button class="style-btn active" onclick="setStyle(this,'brief')">Кратко</button>
    <button class="style-btn" onclick="setStyle(this,'detailed')">Подробно</button>
    <button class="style-btn" onclick="setStyle(this,'bullets')">Буллеты</button>
    <button class="style-btn" onclick="setStyle(this,'eli5')">Просто</button>
  </div>

  <div class="input-card">
    <textarea id="ta" rows="6" placeholder="Вставь текст для анализа..." oninput="upd()"></textarea>
    <div class="input-footer">
      <span class="chars" id="chars">0 символов</span>
      <div class="actions-row">
        <button class="tr-btn" id="tr-ru" onclick="translateText('en-ru')">→ RU</button>
        <button class="tr-btn" id="tr-en" onclick="translateText('ru-en')">→ EN</button>
        <button class="run-btn" id="rbtn" onclick="go()">
          <svg viewBox="0 0 14 14" fill="none">
            <path d="M2 7h10M8 3l4 4-4 4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Запустить
        </button>
      </div>
    </div>
  </div>

  <div class="result-card">
    <div class="result-header">
      <div class="result-label">Вывод</div>
      <div class="result-actions">
        <button class="copy-btn" onclick="copyResult()">Копировать</button>
        <div class="model-chip">
          <div class="chip-dot" id="cdot"></div>
          <span id="cname">llama-3.1-8b</span>
        </div>
      </div>
    </div>
    <div class="result-text" id="result">Результат появится здесь...</div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-val" id="s1">0</div><div class="stat-lbl">ЗАПРОСОВ</div></div>
    <div class="stat"><div class="stat-val" id="s2">—</div><div class="stat-lbl">ВРЕМЯ</div></div>
    <div class="stat"><div class="stat-val" id="s3">0</div><div class="stat-lbl">СИМВОЛОВ</div></div>
  </div>
</div>

<script>
let model = 'llama-3.1-8b-instant';
let style = 'brief';
let reqs = 0;

const modes = {
  fast: { text: 'Quick Scan — готов к работе', chip: 'llama-3.1-8b', dotColor: '#6366f1' },
  pro:  { text: 'Deep Analysis — точный режим', chip: 'llama-3.3-70b', dotColor: '#10b981' }
};

function pick(el, mode, m) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); model = m;
  const cfg = modes[mode];
  const n = document.getElementById('notif');
  n.className = 'notif ok';
  n.querySelector('.notif-dot').style.background = cfg.dotColor;
  document.getElementById('ntxt').textContent = cfg.text;
  document.getElementById('cname').textContent = cfg.chip;
  document.getElementById('cdot').style.background = cfg.dotColor;
}

function setStyle(el, s) {
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  style = s;
}

function upd() {
  const len = document.getElementById('ta').value.length;
  const el = document.getElementById('chars');
  el.textContent = len.toLocaleString() + ' символов';
  el.className = len > 40000 ? 'chars warn' : 'chars';
  document.getElementById('s3').textContent = len.toLocaleString();
}

function copyResult() {
  const text = document.getElementById('result').innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Скопировано!';
    setTimeout(() => btn.textContent = 'Копировать', 2000);
  });
}

function formatText(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^#{1,3}\s+(.+)$/gm, '<strong style="display:block;margin:10px 0 4px;font-size:15px;color:#fff;">$1</strong>')
    .replace(/^\*\s+(.+)$/gm, '<div style="display:flex;gap:8px;margin:4px 0;"><span style="color:#a5b4fc;flex-shrink:0;margin-top:2px;">•</span><span>$1</span></div>')
    .replace(/^-\s+(.+)$/gm, '<div style="display:flex;gap:8px;margin:4px 0;"><span style="color:#a5b4fc;flex-shrink:0;margin-top:2px;">•</span><span>$1</span></div>')
    .replace(/^\+\s+(.+)$/gm, '<div style="display:flex;gap:8px;margin:2px 0 2px 16px;"><span style="color:#6ee7b7;flex-shrink:0;margin-top:2px;">–</span><span>$1</span></div>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

async function runRequest(endpoint, body) {
  const text = document.getElementById('ta').value.trim();
  if (!text) return;
  const buttons = [document.getElementById('rbtn'), document.getElementById('tr-ru'), document.getElementById('tr-en')];
  const result = document.getElementById('result');
  const notif = document.getElementById('notif');
  buttons.forEach(b => b.disabled = true);
  result.innerHTML = '<span class="cursor"></span>';
  notif.className = 'notif ok';
  document.getElementById('ntxt').textContent = 'Обрабатываю...';
  const t0 = Date.now();
  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, ...body })
    });
    const data = await res.json();
    const answer = data.result;
    result.innerHTML = '';
    let i = 0;
    const iv = setInterval(() => {
      i += 3;
      if (i >= answer.length) {
        i = answer.length;
        clearInterval(iv);
        result.innerHTML = formatText(answer);
        reqs++;
        const ms = ((Date.now() - t0) / 1000).toFixed(1);
        document.getElementById('s1').textContent = reqs;
        document.getElementById('s2').textContent = ms + 's';
        notif.className = 'notif ok';
        document.getElementById('ntxt').textContent = 'Готово за ' + ms + ' сек';
        buttons.forEach(b => b.disabled = false);
      } else {
        result.textContent = answer.slice(0, i) + '▍';
      }
    }, 14);
  } catch(e) {
    result.textContent = 'Ошибка соединения. Попробуй снова.';
    notif.className = 'notif err';
    document.getElementById('ntxt').textContent = 'Ошибка запроса';
    buttons.forEach(b => b.disabled = false);
  }
}

function go() {
  return runRequest('/summarize', { model, style });
}

function translateText(direction) {
  return runRequest('/translate', { direction });
}
</script>

<script>
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });
const stars = Array.from({length: 160}, () => ({
  x: Math.random() * W, y: Math.random() * H,
  r: Math.random() * 1.4 + 0.2, speed: Math.random() * 0.3 + 0.05,
  opacity: Math.random() * 0.7 + 0.2, drift: (Math.random() - 0.5) * 0.1,
  twinkle: Math.random() * Math.PI * 2
}));
const shoots = [];
setInterval(() => {
  shoots.push({ x: Math.random() * W, y: -10, len: Math.random() * 90 + 40, speed: Math.random() * 5 + 3, opacity: 1, angle: Math.PI / 5 + (Math.random() - 0.5) * 0.3 });
}, 3000);
function drawGalaxy(cx, cy, radius, angle, color1, color2, arms) {
  for (let a = 0; a < arms; a++) {
    for (let i = 0; i < 180; i++) {
      const t = i / 180;
      const armAngle = (a / arms) * Math.PI * 2 + t * Math.PI * 3 + angle;
      const r = t * radius;
      const spread = (Math.random() - 0.5) * radius * 0.22;
      const x = cx + Math.cos(armAngle) * (r + spread);
      const y = cy + Math.sin(armAngle) * (r * 0.45 + spread * 0.4);
      const alpha = (1 - t) * 0.55 * Math.random();
      const size = Math.random() * 1.8 + 0.2;
      ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fillStyle = t < 0.3 ? `rgba(${color1},${alpha})` : `rgba(${color2},${alpha * 0.7})`;
      ctx.fill();
    }
  }
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 0.18);
  grd.addColorStop(0, 'rgba(255,240,200,0.55)');
  grd.addColorStop(0.4, `rgba(${color1},0.18)`);
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(cx, cy, radius * 0.18, 0, Math.PI * 2);
  ctx.fillStyle = grd; ctx.fill();
}
function drawSun(cx, cy) {
  for (let i = 3; i >= 1; i--) {
    const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 28 * i);
    grd.addColorStop(0, `rgba(255,220,80,${0.06 / i})`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(cx, cy, 28 * i, 0, Math.PI * 2);
    ctx.fillStyle = grd; ctx.fill();
  }
  const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, 14);
  core.addColorStop(0, 'rgba(255,255,200,0.95)');
  core.addColorStop(0.4, 'rgba(255,180,40,0.85)');
  core.addColorStop(1, 'rgba(255,100,0,0)');
  ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI * 2);
  ctx.fillStyle = core; ctx.fill();
}
const planets = [
  { ox: 0.72, oy: 0.28, r: 7,  color: '120,180,255', ring: false },
  { ox: 0.15, oy: 0.65, r: 11, color: '180,130,255', ring: true  },
  { ox: 0.88, oy: 0.72, r: 6,  color: '100,220,180', ring: false },
  { ox: 0.45, oy: 0.85, r: 5,  color: '255,160,100', ring: false },
];
function drawPlanet(p) {
  const x = p.ox * W, y = p.oy * H;
  if (p.ring) {
    ctx.save(); ctx.translate(x, y); ctx.scale(1, 0.3);
    ctx.beginPath(); ctx.arc(0, 0, p.r * 2.2, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${p.color},0.25)`; ctx.lineWidth = 3; ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, p.r * 1.7, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${p.color},0.15)`; ctx.lineWidth = 2; ctx.stroke();
    ctx.restore();
  }
  for (let i = 3; i >= 1; i--) {
    const grd = ctx.createRadialGradient(x, y, 0, x, y, p.r * 2.5 * i);
    grd.addColorStop(0, `rgba(${p.color},${0.04 / i})`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(x, y, p.r * 2.5 * i, 0, Math.PI * 2);
    ctx.fillStyle = grd; ctx.fill();
  }
  const grd = ctx.createRadialGradient(x - p.r * 0.3, y - p.r * 0.3, 0, x, y, p.r);
  grd.addColorStop(0, 'rgba(255,255,255,0.9)');
  grd.addColorStop(0.3, `rgba(${p.color},0.95)`);
  grd.addColorStop(1, `rgba(${p.color},0.2)`);
  ctx.beginPath(); ctx.arc(x, y, p.r, 0, Math.PI * 2);
  ctx.fillStyle = grd; ctx.fill();
}
let galaxyAngle = 0, scanY = 0, glitch = false, glitchTimer = 0;
setInterval(() => { glitch = true; glitchTimer = 6; }, 7000);
function draw() {
  ctx.clearRect(0, 0, W, H);
  galaxyAngle += 0.0003;
  scanY = (scanY + 0.5) % H;
  ctx.fillStyle = 'rgba(99,102,241,0.008)';
  ctx.fillRect(0, scanY, W, 1.5);
  drawGalaxy(W * 0.18, H * 0.22, 130, galaxyAngle, '180,160,255', '100,140,255', 3);
  drawGalaxy(W * 0.82, H * 0.75, 100, -galaxyAngle * 0.7, '255,200,150', '200,150,255', 4);
  drawSun(W * 0.55, H * 0.18);
  planets.forEach(drawPlanet);
  stars.forEach(s => {
    s.twinkle += 0.018;
    const alpha = s.opacity * (0.65 + 0.35 * Math.sin(s.twinkle));
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,210,255,${alpha})`; ctx.fill();
    s.y += s.speed; s.x += s.drift;
    if (s.y > H) { s.y = -5; s.x = Math.random() * W; }
  });
  shoots.forEach((s, i) => {
    const ex = s.x + Math.cos(s.angle) * s.len;
    const ey = s.y + Math.sin(s.angle) * s.len;
    const grad = ctx.createLinearGradient(s.x, s.y, ex, ey);
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(1, `rgba(200,210,255,${s.opacity})`);
    ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(ex, ey);
    ctx.strokeStyle = grad; ctx.lineWidth = 1.2; ctx.stroke();
    s.x += Math.cos(s.angle) * s.speed;
    s.y += Math.sin(s.angle) * s.speed;
    s.opacity -= 0.01;
    if (s.opacity <= 0 || s.y > H) shoots.splice(i, 1);
  });
  if (glitch && glitchTimer > 0) {
    const sliceH = Math.random() * 6 + 2;
    const sliceY = Math.random() * H;
    const offset = (Math.random() - 0.5) * 18;
    ctx.drawImage(canvas, 0, sliceY, W, sliceH, offset, sliceY, W, sliceH);
    ctx.fillStyle = 'rgba(99,102,241,0.04)';
    ctx.fillRect(0, sliceY, W, sliceH);
    glitchTimer--;
    if (glitchTimer <= 0) glitch = false;
  }
  requestAnimationFrame(draw);
}
draw();
document.addEventListener('click', e => {
  if (e.target.closest('.mode-btn, .run-btn, .tr-btn, .style-btn, .copy-btn, textarea')) return;
  for (let i = 0; i < 16; i++) {
    stars.push({
      x: e.clientX + (Math.random() - 0.5) * 40,
      y: e.clientY + (Math.random() - 0.5) * 40,
      r: Math.random() * 2 + 0.5, speed: Math.random() * 1.8 + 0.4,
      opacity: Math.random() * 0.9 + 0.3, drift: (Math.random() - 0.5) * 1,
      twinkle: Math.random() * Math.PI * 2
    });
    if (stars.length > 220) stars.splice(0, 16);
  }
});
</script>
