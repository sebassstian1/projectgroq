<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23000'/><text y='.9em' font-size='65' x='18' font-family='monospace' font-weight='700' fill='%2300ff41'>PG</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProjectGroq</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
    :root {
      --mx-bg:        #000;
      --mx-bg-soft:   rgba(0, 20, 6, 0.6);
      --mx-green:     #00ff41;
      --mx-green-dim: #008f11;
      --mx-green-hi:  #cfffd4;
      --mx-amber:     #ffb000;
      --mx-red:       #ff003c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--mx-bg);
      font-family: 'Space Grotesk', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem; overflow-x: hidden;
      color: var(--mx-green);
      animation: fadeIn 0.6s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* виньетка поверх дождя — центр чуть темнее, чтобы текст читался */
    .vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.85) 70%, rgba(0,0,0,0.95) 100%);
    }
    /* лёгкие сканлайны для CRT-вайба */
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 2;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,65,0.025) 0px,
        rgba(0,255,65,0.025) 1px,
        transparent 1px,
        transparent 3px
      );
      mix-blend-mode: screen;
    }

    .app { width: 100%; max-width: 600px; position: relative; z-index: 3; }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 6px;
      background: #000; border: 1px solid var(--mx-green);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px; font-weight: 700; color: var(--mx-green);
      box-shadow: 0 0 12px rgba(0,255,65,0.35), inset 0 0 8px rgba(0,255,65,0.15);
    }
    .logo-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px; font-weight: 600; color: var(--mx-green-hi);
      letter-spacing: 0.05em; text-shadow: 0 0 6px rgba(0,255,65,0.5);
    }
    .logo-text span { color: var(--mx-green-dim); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .status-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 4px;
      background: rgba(0,255,65,0.06); border: 1px solid rgba(0,255,65,0.35);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; color: var(--mx-green); font-weight: 500; letter-spacing: 0.1em;
    }
    .logout-btn {
      padding: 5px 12px; border-radius: 4px;
      background: rgba(255,0,60,0.05); border: 1px solid rgba(255,0,60,0.35);
      color: var(--mx-red); font-size: 11px; font-weight: 500;
      text-decoration: none; letter-spacing: 0.1em; transition: all 0.2s;
      font-family: 'Share Tech Mono', monospace;
    }
    .logout-btn:hover { background: rgba(255,0,60,0.15); box-shadow: 0 0 10px rgba(255,0,60,0.3); }

    .pulse {
      width: 6px; height: 6px; border-radius: 50%; background: var(--mx-green);
      box-shadow: 0 0 0 0 rgba(0,255,65,0.5); animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(0,255,65,0.5); }
      70%  { box-shadow: 0 0 0 8px rgba(0,255,65,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,255,65,0); }
    }

    .section-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; font-weight: 600; color: var(--mx-green-dim);
      letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 8px;
    }
    .section-label::before { content: '> '; color: var(--mx-green); }

    .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .mode-btn {
      padding: 14px 16px; border-radius: 6px;
      border: 1px solid rgba(0,255,65,0.2);
      background: rgba(0,20,6,0.45);
      color: var(--mx-green-dim); cursor: pointer;
      transition: all 0.2s; text-align: left; position: relative; overflow: hidden;
      font-family: inherit;
    }
    .mode-btn:hover { border-color: rgba(0,255,65,0.5); color: var(--mx-green); }
    .mode-btn.active {
      border-color: var(--mx-green); color: var(--mx-green-hi);
      background: rgba(0,255,65,0.07);
      box-shadow: 0 0 18px rgba(0,255,65,0.25), inset 0 0 12px rgba(0,255,65,0.05);
    }
    .mode-btn.active.pro { border-color: var(--mx-amber); color: #ffe9b0; box-shadow: 0 0 18px rgba(255,176,0,0.25), inset 0 0 12px rgba(255,176,0,0.05); }
    .mode-tag {
      display: inline-block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.15em; padding: 2px 7px; border-radius: 3px; margin-bottom: 6px;
      background: rgba(0,255,65,0.15); color: var(--mx-green);
    }
    .pro .mode-tag { background: rgba(255,176,0,0.15); color: var(--mx-amber); }
    .mode-title { font-size: 14px; font-weight: 600; display: block; margin-bottom: 2px; }
    .mode-desc  { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--mx-green-dim); }
    .mode-btn.active .mode-desc { color: var(--mx-green); }

    .notif {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 6px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px; font-weight: 500; margin-bottom: 10px; transition: all 0.25s;
      letter-spacing: 0.05em;
    }
    .notif.ok   { background: rgba(0,255,65,0.06);  border: 1px solid rgba(0,255,65,0.3);  color: var(--mx-green); }
    .notif.warn { background: rgba(255,176,0,0.06); border: 1px solid rgba(255,176,0,0.3); color: var(--mx-amber); }
    .notif.err  { background: rgba(255,0,60,0.06);  border: 1px solid rgba(255,0,60,0.35); color: var(--mx-red); }
    .notif-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .ok   .notif-dot { background: var(--mx-green); box-shadow: 0 0 6px var(--mx-green); }
    .warn .notif-dot { background: var(--mx-amber); box-shadow: 0 0 6px var(--mx-amber); }
    .err  .notif-dot { background: var(--mx-red);   box-shadow: 0 0 6px var(--mx-red); }

    .style-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .style-btn {
      padding: 5px 14px; border-radius: 4px;
      border: 1px solid rgba(0,255,65,0.2);
      background: rgba(0,20,6,0.4);
      color: var(--mx-green-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; letter-spacing: 0.05em;
      cursor: pointer; transition: all 0.18s;
    }
    .style-btn:hover { color: var(--mx-green); border-color: rgba(0,255,65,0.4); }
    .style-btn.active {
      background: rgba(0,255,65,0.12);
      border-color: var(--mx-green);
      color: var(--mx-green-hi); font-weight: 600;
      box-shadow: 0 0 10px rgba(0,255,65,0.2);
    }

    .input-card {
      background: var(--mx-bg-soft);
      border: 1px solid rgba(0,255,65,0.35);
      border-radius: 8px; padding: 16px 18px; margin-bottom: 10px;
      transition: border-color 0.3s, box-shadow 0.3s;
      box-shadow: 0 0 18px rgba(0,255,65,0.08), inset 0 0 20px rgba(0,255,65,0.03);
      backdrop-filter: blur(2px);
    }
    .input-card:focus-within {
      border-color: var(--mx-green);
      box-shadow: 0 0 28px rgba(0,255,65,0.25), inset 0 0 20px rgba(0,255,65,0.05);
    }
    textarea {
      width: 100%; background: transparent; border: none; outline: none;
      color: var(--mx-green-hi); font-size: 14px; line-height: 1.75;
      resize: none; font-family: inherit;
      caret-color: var(--mx-green);
    }
    textarea::placeholder { color: var(--mx-green-dim); opacity: 0.6; }

    .input-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 12px; margin-top: 12px; border-top: 1px solid rgba(0,255,65,0.15);
    }
    .chars { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--mx-green-dim); font-weight: 500; }
    .chars.warn { color: var(--mx-amber); }

    .run-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 22px; border-radius: 6px;
      border: 1px solid var(--mx-green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px; font-weight: 600; cursor: pointer;
      color: #000; background: var(--mx-green);
      letter-spacing: 0.1em; transition: all 0.2s;
      box-shadow: 0 0 14px rgba(0,255,65,0.5);
    }
    .run-btn:hover { background: var(--mx-green-hi); box-shadow: 0 0 22px rgba(0,255,65,0.7); transform: translateY(-1px); }
    .run-btn:active { transform: translateY(0); }
    .run-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }
    .run-btn svg { width: 14px; height: 14px; }

    .actions-row { display: flex; gap: 8px; align-items: center; }
    .tr-btn {
      padding: 10px 14px; border-radius: 6px;
      border: 1px solid rgba(0,255,65,0.4);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px; font-weight: 600; cursor: pointer;
      color: var(--mx-green); background: transparent;
      letter-spacing: 0.1em; transition: all 0.2s;
    }
    .tr-btn:hover { background: rgba(0,255,65,0.1); box-shadow: 0 0 10px rgba(0,255,65,0.3); transform: translateY(-1px); }
    .tr-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }

    .result-card {
      background: var(--mx-bg-soft);
      border: 1px solid rgba(0,255,65,0.3);
      border-radius: 8px; padding: 16px 18px;
      box-shadow: 0 0 18px rgba(0,255,65,0.07), inset 0 0 20px rgba(0,255,65,0.02);
      backdrop-filter: blur(2px);
    }
    .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .result-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; font-weight: 600; color: var(--mx-green-dim);
      letter-spacing: 0.18em; text-transform: uppercase;
    }
    .result-label::before { content: '> '; color: var(--mx-green); }
    .result-actions { display: flex; align-items: center; gap: 8px; }
    .model-chip {
      display: flex; align-items: center; gap: 5px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; color: var(--mx-green-dim);
      background: rgba(0,255,65,0.05); border: 1px solid rgba(0,255,65,0.2);
      padding: 3px 10px; border-radius: 4px; font-weight: 500;
    }
    .copy-btn {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 4px;
      border: 1px solid rgba(0,255,65,0.3);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; font-weight: 500; cursor: pointer;
      background: rgba(0,255,65,0.08); color: var(--mx-green);
      letter-spacing: 0.05em; transition: all 0.2s;
    }
    .copy-btn:hover { background: rgba(0,255,65,0.18); box-shadow: 0 0 8px rgba(0,255,65,0.3); }
    .chip-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--mx-green); box-shadow: 0 0 4px var(--mx-green); }

    .result-text { font-size: 14px; color: var(--mx-green-hi); line-height: 1.8; min-height: 56px; text-shadow: 0 0 4px rgba(0,255,65,0.3); }
    .result-text strong { color: #fff; font-weight: 600; text-shadow: 0 0 8px rgba(0,255,65,0.6); }

    .stats-row { display: flex; gap: 8px; margin-top: 10px; }
    .stat {
      flex: 1; padding: 10px 12px; border-radius: 6px;
      background: rgba(0,20,6,0.4); border: 1px solid rgba(0,255,65,0.2); text-align: center;
    }
    .stat-val {
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px; font-weight: 700; color: var(--mx-green-hi);
      text-shadow: 0 0 8px rgba(0,255,65,0.5);
    }
    .stat-lbl {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; color: var(--mx-green-dim); margin-top: 2px;
      font-weight: 500; letter-spacing: 0.1em;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor {
      display: inline-block; width: 8px; height: 14px; background: var(--mx-green);
      box-shadow: 0 0 6px var(--mx-green);
      animation: blink 0.7s infinite; vertical-align: middle; margin-left: 1px;
    }

    @media (prefers-reduced-motion: reduce) {
      body, .pulse, .cursor { animation: none !important; }
    }
  </style>
</head>
<body>
<canvas id="matrix-rain" style="position:fixed;inset:0;z-index:0;display:block;"></canvas>
<div class="vignette"></div>
<div class="scanlines"></div>

<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">PG</div>
      <div class="logo-text">Project<span>Groq</span></div>
    </div>
    <div class="header-right">
      <div class="status-badge"><div class="pulse"></div>ONLINE</div>
      <a href="/logout" class="logout-btn">ВЫЙТИ</a>
    </div>
  </div>

  <div class="section-label">Режим обработки</div>
  <div class="mode-grid">
    <button class="mode-btn fast active" onclick="pick(this,'fast','llama-3.1-8b-instant')">
      <span class="mode-tag">FAST</span>
      <span class="mode-title">Quick Scan</span>
      <span class="mode-desc">Llama 3.1 8B · быстро</span>
    </button>
    <button class="mode-btn pro" onclick="pick(this,'pro','llama-3.3-70b-versatile')">
      <span class="mode-tag">PRO</span>
      <span class="mode-title">Deep Analysis</span>
      <span class="mode-desc">Llama 3.3 70B · точно</span>
    </button>
  </div>

  <div class="notif ok" id="notif">
    <div class="notif-dot"></div>
    <span id="ntxt">Quick Scan — готов к работе</span>
  </div>

  <div class="section-label">Стиль суммаризации</div>
  <div class="style-row">
    <button class="style-btn active" onclick="setStyle(this,'brief')">Кратко</button>
    <button class="style-btn" onclick="setStyle(this,'detailed')">Подробно</button>
    <button class="style-btn" onclick="setStyle(this,'bullets')">Буллеты</button>
    <button class="style-btn" onclick="setStyle(this,'eli5')">Просто</button>
  </div>

  <div class="input-card">
    <textarea id="ta" rows="6" placeholder="> вставь текст для анализа..." oninput="upd()"></textarea>
    <div class="input-footer">
      <span class="chars" id="chars">0 символов</span>
      <div class="actions-row">
        <button class="tr-btn" id="tr-ru" onclick="translateText('en-ru')">→ RU</button>
        <button class="tr-btn" id="tr-en" onclick="translateText('ru-en')">→ EN</button>
        <button class="run-btn" id="rbtn" onclick="go()">
          <svg viewBox="0 0 14 14" fill="none">
            <path d="M2 7h10M8 3l4 4-4 4" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          RUN
        </button>
      </div>
    </div>
  </div>

  <div class="result-card">
    <div class="result-header">
      <div class="result-label">Вывод</div>
      <div class="result-actions">
        <button class="copy-btn" onclick="copyResult()">Копировать</button>
        <div class="model-chip">
          <div class="chip-dot" id="cdot"></div>
          <span id="cname">llama-3.1-8b</span>
        </div>
      </div>
    </div>
    <div class="result-text" id="result">> ожидание ввода...</div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-val" id="s1">0</div><div class="stat-lbl">ЗАПРОСОВ</div></div>
    <div class="stat"><div class="stat-val" id="s2">—</div><div class="stat-lbl">ВРЕМЯ</div></div>
    <div class="stat"><div class="stat-val" id="s3">0</div><div class="stat-lbl">СИМВОЛОВ</div></div>
  </div>
</div>

<script>
let model = 'llama-3.1-8b-instant';
let style = 'brief';
let reqs = 0;

const modes = {
  fast: { text: 'Quick Scan — готов к работе', chip: 'llama-3.1-8b', dotColor: '#00ff41' },
  pro:  { text: 'Deep Analysis — точный режим', chip: 'llama-3.3-70b', dotColor: '#ffb000' }
};

function pick(el, mode, m) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); model = m;
  const cfg = modes[mode];
  const n = document.getElementById('notif');
  n.className = 'notif ok';
  n.querySelector('.notif-dot').style.background = cfg.dotColor;
  n.querySelector('.notif-dot').style.boxShadow = '0 0 6px ' + cfg.dotColor;
  document.getElementById('ntxt').textContent = cfg.text;
  document.getElementById('cname').textContent = cfg.chip;
  document.getElementById('cdot').style.background = cfg.dotColor;
  document.getElementById('cdot').style.boxShadow = '0 0 4px ' + cfg.dotColor;
}

function setStyle(el, s) {
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  style = s;
}

function upd() {
  const len = document.getElementById('ta').value.length;
  const el = document.getElementById('chars');
  el.textContent = len.toLocaleString() + ' символов';
  el.className = len > 40000 ? 'chars warn' : 'chars';
  document.getElementById('s3').textContent = len.toLocaleString();
}

function copyResult() {
  const text = document.getElementById('result').innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Скопировано!';
    setTimeout(() => btn.textContent = 'Копировать', 2000);
  });
}

function formatText(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^#{1,3}\s+(.+)$/gm, '<strong style="display:block;margin:10px 0 4px;font-size:15px;color:#fff;">$1</strong>')
    .replace(/^\*\s+(.+)$/gm, '<div style="display:flex;gap:8px;margin:4px 0;"><span style="color:#00ff41;flex-shrink:0;margin-top:2px;">▸</span><span>$1</span></div>')
    .replace(/^-\s+(.+)$/gm, '<div style="display:flex;gap:8px;margin:4px 0;"><span style="color:#00ff41;flex-shrink:0;margin-top:2px;">▸</span><span>$1</span></div>')
    .replace(/^\+\s+(.+)$/gm, '<div style="display:flex;gap:8px;margin:2px 0 2px 16px;"><span style="color:#cfffd4;flex-shrink:0;margin-top:2px;">–</span><span>$1</span></div>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

async function runRequest(endpoint, body) {
  const text = document.getElementById('ta').value.trim();
  if (!text) return;
  const buttons = [document.getElementById('rbtn'), document.getElementById('tr-ru'), document.getElementById('tr-en')];
  const result = document.getElementById('result');
  const notif = document.getElementById('notif');
  buttons.forEach(b => b.disabled = true);
  result.innerHTML = '<span class="cursor"></span>';
  notif.className = 'notif ok';
  document.getElementById('ntxt').textContent = '> processing...';
  const t0 = Date.now();
  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, ...body })
    });
    const data = await res.json();
    const answer = data.result;
    result.innerHTML = '';
    let i = 0;
    const iv = setInterval(() => {
      i += 3;
      if (i >= answer.length) {
        i = answer.length;
        clearInterval(iv);
        result.innerHTML = formatText(answer);
        reqs++;
        const ms = ((Date.now() - t0) / 1000).toFixed(1);
        document.getElementById('s1').textContent = reqs;
        document.getElementById('s2').textContent = ms + 's';
        notif.className = 'notif ok';
        document.getElementById('ntxt').textContent = '> готово за ' + ms + ' сек';
        buttons.forEach(b => b.disabled = false);
      } else {
        result.textContent = answer.slice(0, i) + '▍';
      }
    }, 14);
  } catch(e) {
    result.textContent = '> ошибка соединения. попробуй снова.';
    notif.className = 'notif err';
    document.getElementById('ntxt').textContent = '> ERROR';
    buttons.forEach(b => b.disabled = false);
  }
}

function go() {
  return runRequest('/summarize', { model, style });
}

function translateText(direction) {
  return runRequest('/translate', { direction });
}
</script>

<script>
// Matrix rain — цифровой дождь.
// Особенности: яркая голова потока, разные скорости колонок,
// случайная мутация символов, пауза при скрытой вкладке,
// уважение к prefers-reduced-motion, поддержка Retina (DPR).
(() => {
  const canvas = document.getElementById('matrix-rain');
  const ctx = canvas.getContext('2d');
  const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

  const CHARS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF<>{}[]/\\|=+*#$%@&'.split('');
  const FONT_SIZE = 16;

  let W = 0, H = 0, DPR = 1;
  let columns = 0;
  // для каждой колонки: y (позиция головы в "ячейках"), speed, длина следа
  let drops = [];

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    columns = Math.floor(W / FONT_SIZE);
    drops = Array.from({length: columns}, () => ({
      y: Math.random() * -50,
      speed: 0.4 + Math.random() * 1.0,        // ячеек за кадр
      len: 8 + Math.floor(Math.random() * 18), // длина светящегося хвоста
    }));

    // первичная заливка чёрным
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
  }
  resize();
  window.addEventListener('resize', resize);

  // если пользователь просил уменьшить анимацию — рисуем тёмно-зелёный градиент и выходим
  if (reduceMotion) {
    const g = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)/1.2);
    g.addColorStop(0, 'rgba(0,40,12,0.6)');
    g.addColorStop(1, '#000');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    return;
  }

  let running = true;
  document.addEventListener('visibilitychange', () => {
    running = !document.hidden;
    if (running) loop();
  });

  function frame() {
    // полупрозрачная заливка → след тает
    ctx.fillStyle = 'rgba(0, 0, 0, 0.07)';
    ctx.fillRect(0, 0, W, H);

    ctx.font = FONT_SIZE + "px 'Share Tech Mono', monospace";
    ctx.textBaseline = 'top';

    for (let i = 0; i < drops.length; i++) {
      const d = drops[i];
      const x = i * FONT_SIZE;
      const headY = Math.floor(d.y) * FONT_SIZE;

      // хвост — тусклый зелёный, плавно исчезает к краю
      for (let k = 1; k < d.len; k++) {
        const ty = headY - k * FONT_SIZE;
        if (ty < -FONT_SIZE) break;
        const alpha = (1 - k / d.len) * 0.55;
        ctx.fillStyle = `rgba(0, 255, 65, ${alpha})`;
        const ch = CHARS[(Math.random() * CHARS.length) | 0];
        ctx.fillText(ch, x, ty);
      }

      // голова — белая со свечением
      const headChar = CHARS[(Math.random() * CHARS.length) | 0];
      ctx.shadowColor = '#00ff41';
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#cfffd4';
      ctx.fillText(headChar, x, headY);
      ctx.shadowBlur = 0;

      d.y += d.speed;

      // улетел за низ → перезапуск с новыми параметрами
      if (headY > H && Math.random() > 0.975) {
        d.y = Math.random() * -20;
        d.speed = 0.4 + Math.random() * 1.0;
        d.len = 8 + Math.floor(Math.random() * 18);
      }
    }
  }

  function loop() {
    if (!running) return;
    frame();
    requestAnimationFrame(loop);
  }
  loop();

  // клик-эффект: вспышка зелёных символов в точке клика
  document.addEventListener('click', e => {
    if (e.target.closest('.mode-btn, .run-btn, .tr-btn, .style-btn, .copy-btn, textarea, a, button, input')) return;
    const cx = e.clientX, cy = e.clientY;
    let burstFrame = 0;
    const burstChars = Array.from({length: 14}, () => ({
      ch: CHARS[(Math.random() * CHARS.length) | 0],
      dx: (Math.random() - 0.5) * 4,
      dy: (Math.random() - 0.5) * 4,
      x: cx, y: cy,
      life: 30 + Math.random() * 20,
    }));
    function burst() {
      ctx.font = FONT_SIZE + "px 'Share Tech Mono', monospace";
      let alive = false;
      burstChars.forEach(b => {
        if (b.life <= 0) return;
        alive = true;
        b.x += b.dx; b.y += b.dy; b.life--;
        ctx.shadowColor = '#00ff41'; ctx.shadowBlur = 10;
        ctx.fillStyle = `rgba(207,255,212,${b.life / 50})`;
        ctx.fillText(b.ch, b.x, b.y);
        ctx.shadowBlur = 0;
      });
      burstFrame++;
      if (alive && burstFrame < 60) requestAnimationFrame(burst);
    }
    burst();
  });
})();
</script>
</body>
</html>
