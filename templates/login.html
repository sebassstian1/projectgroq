<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23000'/><text y='.9em' font-size='65' x='18' font-family='monospace' font-weight='700' fill='%2300ff41'>PG</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProjectGroq — Вход</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');
    :root {
      --mx-green:     #00ff41;
      --mx-green-dim: #008f11;
      --mx-green-hi:  #cfffd4;
      --mx-red:       #ff003c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      color: var(--mx-green);
      animation: fadeIn 1s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.85) 70%, rgba(0,0,0,0.95) 100%);
    }
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 2;
      background: repeating-linear-gradient(to bottom, rgba(0,255,65,0.025) 0px, rgba(0,255,65,0.025) 1px, transparent 1px, transparent 3px);
      mix-blend-mode: screen;
    }

    .card {
      width: 100%; max-width: 380px;
      background: rgba(0, 20, 6, 0.7);
      border: 1px solid var(--mx-green);
      border-radius: 8px; padding: 2rem;
      position: relative; z-index: 3;
      box-shadow: 0 0 40px rgba(0,255,65,0.25), inset 0 0 20px rgba(0,255,65,0.04);
      backdrop-filter: blur(2px);
    }
    .logo {
      font-family: 'Share Tech Mono', monospace;
      font-size: 22px; font-weight: 700; color: var(--mx-green-hi);
      text-align: center; margin-bottom: 0.5rem;
      letter-spacing: 0.05em; text-shadow: 0 0 8px rgba(0,255,65,0.6);
    }
    .logo span { color: var(--mx-green-dim); }
    .subtitle {
      font-family: 'Share Tech Mono', monospace;
      text-align: center; font-size: 13px; color: var(--mx-green-dim);
      margin-bottom: 2rem; letter-spacing: 0.05em;
    }
    .subtitle::before { content: '> '; color: var(--mx-green); }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; font-weight: 600;
      color: var(--mx-green-dim); letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .field label::before { content: '> '; color: var(--mx-green); }

    .field input {
      width: 100%; padding: 11px 14px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0,255,65,0.35);
      border-radius: 4px; color: var(--mx-green-hi);
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px; letter-spacing: 0.05em;
      outline: none; transition: all 0.2s;
      caret-color: var(--mx-green);
    }
    .field input:focus {
      border-color: var(--mx-green);
      box-shadow: 0 0 12px rgba(0,255,65,0.35), inset 0 0 8px rgba(0,255,65,0.05);
    }
    .field input::placeholder { color: var(--mx-green-dim); opacity: 0.6; }

    .error {
      padding: 10px 14px; border-radius: 4px;
      background: rgba(255,0,60,0.08);
      border: 1px solid rgba(255,0,60,0.4);
      color: var(--mx-red);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px; letter-spacing: 0.03em;
      margin-bottom: 14px; text-align: center;
    }
    .error::before { content: '⚠ '; }

    .submit {
      width: 100%; padding: 11px; border-radius: 4px;
      border: 1px solid var(--mx-green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px; font-weight: 600; cursor: pointer;
      color: #000; background: var(--mx-green);
      letter-spacing: 0.15em; transition: all 0.2s;
      margin-top: 6px;
      box-shadow: 0 0 14px rgba(0,255,65,0.45);
    }
    .submit:hover { background: var(--mx-green-hi); box-shadow: 0 0 22px rgba(0,255,65,0.7); }

    .step-hint {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px; color: var(--mx-green-dim);
      margin-bottom: 14px; text-align: center; letter-spacing: 0.05em;
    }
    .step-hint::before { content: '> '; color: var(--mx-green); }

    @media (prefers-reduced-motion: reduce) { body { animation: none; } }
  </style>
</head>
<body>
<canvas id="matrix-rain" style="position:fixed;inset:0;z-index:0;display:block;"></canvas>
<div class="vignette"></div>
<div class="scanlines"></div>

<div class="card">
  <div class="logo">Project<span>Groq</span></div>
  <div class="subtitle">введите данные для входа</div>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST" id="loginForm" onsubmit="return false;">
    <div id="step1">
      <div class="field">
        <label>Логин</label>
        <input type="text" name="username" id="username" placeholder="username" required>
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" name="password" id="password" placeholder="••••••••">
      </div>
      <button type="button" class="submit" onclick="showCaptcha()">ВОЙТИ</button>
    </div>

    <div id="step2" style="display:none;">
      <div class="step-hint">подтвердите что вы не робот</div>
      <div class="g-recaptcha"
           data-sitekey="6Le4zrwsAAAAACi1L0WS1IbnGfGqfCoE3o-qwf4S"
           data-theme="dark"
           style="margin-bottom:14px;">
      </div>
      <button type="button" class="submit" onclick="submitForm()">ПОДТВЕРДИТЬ</button>
    </div>
  </form>
</div>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<script>
function showCaptcha() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  if (!u || !p) {
    alert('Введите логин и пароль');
    return;
  }
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
}

function submitForm() {
  const captcha = document.getElementById('g-recaptcha-response');
  if (!captcha || !captcha.value) {
    alert('Пройдите капчу');
    return;
  }
  document.getElementById('loginForm').setAttribute('onsubmit', '');
  document.getElementById('loginForm').submit();
}
</script>

<script>
// Matrix rain — упрощённая версия для логина (без клик-эффектов).
(() => {
  const canvas = document.getElementById('matrix-rain');
  const ctx = canvas.getContext('2d');
  const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const CHARS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホ0123456789<>{}[]/\\|=+*#$%@&'.split('');
  const FONT_SIZE = 16;
  let W, H, DPR = 1, columns = 0, drops = [];

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    columns = Math.floor(W / FONT_SIZE);
    drops = Array.from({length: columns}, () => ({
      y: Math.random() * -50,
      speed: 0.4 + Math.random() * 1.0,
      len: 8 + Math.floor(Math.random() * 18),
    }));
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  }
  resize();
  window.addEventListener('resize', resize);

  if (reduceMotion) {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
    return;
  }

  let running = true;
  document.addEventListener('visibilitychange', () => {
    running = !document.hidden;
    if (running) loop();
  });

  function frame() {
    ctx.fillStyle = 'rgba(0,0,0,0.07)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = FONT_SIZE + "px 'Share Tech Mono', monospace";
    ctx.textBaseline = 'top';
    for (let i = 0; i < drops.length; i++) {
      const d = drops[i];
      const x = i * FONT_SIZE;
      const headY = Math.floor(d.y) * FONT_SIZE;
      for (let k = 1; k < d.len; k++) {
        const ty = headY - k * FONT_SIZE;
        if (ty < -FONT_SIZE) break;
        const alpha = (1 - k / d.len) * 0.55;
        ctx.fillStyle = `rgba(0,255,65,${alpha})`;
        ctx.fillText(CHARS[(Math.random()*CHARS.length)|0], x, ty);
      }
      ctx.shadowColor = '#00ff41'; ctx.shadowBlur = 8;
      ctx.fillStyle = '#cfffd4';
      ctx.fillText(CHARS[(Math.random()*CHARS.length)|0], x, headY);
      ctx.shadowBlur = 0;
      d.y += d.speed;
      if (headY > H && Math.random() > 0.975) {
        d.y = Math.random() * -20;
        d.speed = 0.4 + Math.random() * 1.0;
        d.len = 8 + Math.floor(Math.random() * 18);
      }
    }
  }
  function loop() { if (!running) return; frame(); requestAnimationFrame(loop); }
  loop();
})();
</script>
</body>
</html>
