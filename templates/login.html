<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%236366f1'/><stop offset='100%' stop-color='%2310b981'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><text y='.9em' font-size='65' x='18' font-family='system-ui' font-weight='700' fill='white'>PG</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProjectGroq — Вход</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #030308;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    .card {
      width: 100%; max-width: 380px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(110,100,220,0.35);
      border-radius: 20px; padding: 2rem;
      position: relative; z-index: 1;
      box-shadow: 0 0 40px rgba(99,90,220,0.1);
    }
    .logo { font-size: 22px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 0.5rem; }
    .logo span { color: rgba(255,255,255,0.35); }
    .subtitle { text-align: center; font-size: 13px; color: rgba(255,255,255,0.3); margin-bottom: 2rem; }
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,0.3); letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 11px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; color: #fff;
      font-size: 14px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: rgba(99,102,241,0.5); }
    .field input::placeholder { color: rgba(255,255,255,0.18); }
    .error {
      padding: 10px 14px; border-radius: 8px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5; font-size: 13px;
      margin-bottom: 14px; text-align: center;
    }
    .submit {
      width: 100%; padding: 11px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer; color: #fff;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      font-family: inherit; transition: opacity 0.2s; margin-top: 6px;
    }
    .submit:hover { opacity: 0.85; }
    body {
  animation: fadeIn 2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="card">
  <div class="logo">Project<span>Groq</span></div>
  <div class="subtitle">Введите данные для входа</div>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST" id="loginForm" onsubmit="return false;">
    <div id="step1">
      <div class="field">
        <label>Логин</label>
        <input type="text" name="username" id="username" placeholder="Введите логин" required>
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" name="password" id="password" placeholder="Введите пароль">
      </div>
      <button type="button" class="submit" onclick="showCaptcha()">Войти</button>
    </div>

    <div id="step2" style="display:none;">
      <div style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:14px;text-align:center;">
        Подтвердите что вы не робот
      </div>
      <div class="g-recaptcha"
           data-sitekey="6Le4zrwsAAAAACi1L0WS1IbnGfGqfCoE3o-qwf4S"
           data-theme="dark"
           style="margin-bottom:14px;">
      </div>
      <button type="button" class="submit" onclick="submitForm()">Подтвердить</button>
    </div>
  </form>
</div>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<script>
function showCaptcha() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  if (!u || !p) {
    alert('Введите логин и пароль');
    return;
  }
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
}

function submitForm() {
  const captcha = document.getElementById('g-recaptcha-response');
  if (!captcha || !captcha.value) {
    alert('Пройдите капчу');
    return;
  }
  document.getElementById('loginForm').setAttribute('onsubmit', '');
  document.getElementById('loginForm').submit();
}
</script>
</body>
</html>
